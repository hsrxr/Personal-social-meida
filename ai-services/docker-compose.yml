version: "3.9"

services:
  # ── AI 引擎主服务 ──
  ai-engine:
    build: .
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - AGENT_C_BASE_URL=http://agent-c:8001
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./prompt_templates:/app/prompt_templates

  # ── Agent 对话 WebSocket 服务 ──
  agent-dialog:
    build: .
    command: uvicorn agent_dialog.main:app --host 0.0.0.0 --port 8003
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── 每日总结 worker ──
  journal-summary:
    build: .
    command: python -m journal_summary.worker
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Redis ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:
